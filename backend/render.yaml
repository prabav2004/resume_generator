services:
  - type: web
    name: resume-generator-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: ENABLE_DOCS
        value: false
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: FRONTEND_URL
        value: https://your-frontend-domain.vercel.app
